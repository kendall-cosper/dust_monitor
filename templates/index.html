<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pi-Station Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-dust: #34d399;
            --text-dim: #94a3b8;
        }
        body { background: var(--bg-color); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.9);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .stat-item { background: var(--card-bg); padding: 15px; border-radius: 12px; border-left: 4px solid var(--text-dim); }
        .stat-item h4 { margin: 0; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-val { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .alert-box { border-left-color: #fb7185; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .chart-card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 25px; }
        .warning { border: 1px solid #ff4444; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-size: 1.2rem; letter-spacing: 1px;">24H STATS</h2>
        <div class="stat-item"><h4>Max Temp</h4><div class="stat-val" id="m-temp">--</div></div>
        <div class="stat-item"><h4>Max Humidity</h4><div class="stat-val" id="m-hum">--</div></div>
        <div class="stat-item"><h4>Max Dust</h4><div class="stat-val" id="m-dust">--</div></div>
        <div class="stat-item alert-box"><h4>Alerts Tripped</h4><div class="stat-val" id="alerts" style="color:#fb7185">0</div></div>
    </div>

    <div class="main-content">
        <div class="chart-card"><canvas id="envChart"></canvas></div>
        <div class="chart-card" id="dust-card"><canvas id="dustChart"></canvas></div>
    </div>

    <script>
        // ... (Keep your Chart.js initialization from the previous response) ...
        // Ensure you update the sidebar IDs in your updateData function:

        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const val = await res.json();

                // Update Sidebar
                document.getElementById('m-temp').innerText = val.max_temp + "°C";
                document.getElementById('m-hum').innerText = val.max_hum + "%";
                document.getElementById('m-dust').innerText = val.max_dust + " µg";
                document.getElementById('alerts').innerText = val.alerts;

                // Dust Warning logic
                const dustCard = document.getElementById('dust-card');
                if (val.dust > 35) { dustCard.classList.add('warning'); } 
                else { dustCard.classList.remove('warning'); }

                // ... Update Charts (labels.push, datasets[0].data.push, etc) ...
                // Use the chart update logic from the previous aesthetic version
                
                envChart.data.labels.push(val.time);
                envChart.data.datasets[0].data.push(val.temp);
                envChart.data.datasets[1].data.push(val.humidity);
                dustChart.data.labels.push(val.time);
                dustChart.data.datasets[0].data.push(val.dust);
                
                if(envChart.data.labels.length > 20) {
                    envChart.data.labels.shift();
                    envChart.data.datasets[0].data.shift();
                    envChart.data.datasets[1].data.shift();
                    dustChart.data.labels.shift();
                    dustChart.data.datasets[0].data.shift();
                }
                envChart.update('none');
                dustChart.update('none');

            } catch (err) { console.error(err); }
        }
        setInterval(updateData, 2000);
    </script>
</body>
</html>
