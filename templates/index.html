<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Station Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-temp: #fb7185;
            --accent-hum: #38bdf8;
            --accent-dust: #34d399;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0 15px rgba(0,0,0,0.2);
        }

        .sidebar h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--text-dim);
        }

        .stat-card.temp { border-left-color: var(--accent-temp); }
        .stat-card.hum { border-left-color: var(--accent-hum); }
        .stat-card.dust { border-left-color: var(--accent-dust); }
        .stat-card.alerts { border-left-color: var(--danger); }

        .stat-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }
        .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title { font-size: 1rem; font-weight: 500; color: var(--text-dim); }

        /* --- WARNING STATES --- */
        .warning-active {
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: rgba(239, 68, 68, 1); }
            100% { border-color: rgba(239, 68, 68, 0.4); }
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(52, 211, 153, 0.1);
            color: var(--accent-dust);
        }

        .status-badge.alert {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>24h Statistics</h2>
        <div class="stat-card temp">
            <div class="stat-label">MAX TEMPERATURE</div>
            <div class="stat-value" id="max-temp">--°C</div>
        </div>
        <div class="stat-card hum">
            <div class="stat-label">MAX HUMIDITY</div>
            <div class="stat-value" id="max-hum">--%</div>
        </div>
        <div class="stat-card dust">
            <div class="stat-label">MAX DUST (PM2.5)</div>
            <div class="stat-value" id="max-dust">-- µg</div>
        </div>
        <div class="stat-card alerts">
            <div class="stat-label">WARNINGS TRIGGERED</div>
            <div class="stat-value" id="alert-count" style="color:var(--danger)">0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container">
            <div class="chart-header">
                <span class="chart-title">Atmospheric Conditions</span>
            </div>
            <canvas id="envChart" height="100"></canvas>
        </div>

        <div class="chart-container" id="dust-card">
            <div class="chart-header">
                <span class="chart-title">Air Quality Index (PM2.5)</span>
                <span id="dust-status" class="status-badge">SYSTEM NORMAL</span>
            </div>
            <canvas id="dustChart" height="100"></canvas>
        </div>
    </div>

    <script>
        // Set Global Chart Defaults for Dark Mode
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';

        document.addEventListener('DOMContentLoaded', function() {
            const envCtx = document.getElementById('envChart').getContext('2d');
            const dustCtx = document.getElementById('dustChart').getContext('2d');

            // --- ENV CHART CONFIG ---
            const envChart = new Chart(envCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Temp °C',
                            data: [],
                            borderColor: '#fb7185',
                            backgroundColor: 'rgba(251, 113, 133, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        },
                        {
                            label: 'Humidity %',
                            data: [],
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'top', align: 'end' } } }
            });

            // --- DUST CHART CONFIG ---
            const dustChart = new Chart(dustCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'PM2.5 µg/m³',
                        data: [],
                        borderColor: '#34d399',
                        backgroundColor: 'rgba(52, 211, 153, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#34d399'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // --- DATA UPDATE LOGIC ---
            async function updateDashboard() {
                try {
                    const response = await fetch('/api/data');
                    const data = await response.json();

                    // Update Sidebar Stats
                    document.getElementById('max-temp').innerText = data.max_temp + '°C';
                    document.getElementById('max-hum').innerText = data.max_hum + '%';
                    document.getElementById('max-dust').innerText = data.max_dust + ' µg';
                    document.getElementById('alert-count').innerText = data.alerts;

                    // Update Dust Warning UI
                    const dustCard = document.getElementById('dust-card');
                    const dustStatus = document.getElementById('dust-status');
                    
                    if (data.dust > 35) {
                        dustCard.classList.add('warning-active');
                        dustStatus.innerText = "HIGH DUST DETECTED";
                        dustStatus.classList.add('alert');
                    } else {
                        dustCard.classList.remove('warning-active');
                        dustStatus.innerText = "SYSTEM NORMAL";
                        dustStatus.classList.remove('alert');
                    }

                    // Update Charts
                    const timeLabel = data.time;
                    
                    [envChart, dustChart].forEach(chart => {
                        chart.data.labels.push(timeLabel);
                        if(chart.data.labels.length > 20) chart.data.labels.shift();
                    });

                    envChart.data.datasets[0].data.push(data.temp);
                    envChart.data.datasets[1].data.push(data.humidity);
                    dustChart.data.datasets[0].data.push(data.dust);

                    [envChart, dustChart].forEach(chart => {
                        chart.data.datasets.forEach(set => {
                            if(set.data.length > 20) set.data.shift();
                        });
                        chart.update('none');
                    });

                } catch (error) {
                    console.error("Dashboard update failed:", error);
                }
            }

            // Polling interval: 2 seconds
            setInterval(updateDashboard, 2000);
        });
    </script>
</body>
</html>
