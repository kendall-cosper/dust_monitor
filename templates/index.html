<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Station Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-temp: #fb7185;
            --accent-hum: #38bdf8;
            --accent-dust: #34d399;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            gap: 25px;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--accent-dust);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px var(--accent-dust);
        }
    </style>
</head>
<body>

    <h1>System Telemetry</h1>

    <div class="dashboard-container">
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Atmospheric Conditions</span>
            </div>
            <canvas id="envChart"></canvas>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Air Quality (PM2.5)</span>
                <div><span class="status-dot"></span><small style="color:var(--text-dim)">LIVE</small></div>
            </div>
            <canvas id="dustChart"></canvas>
        </div>
    </div>

    <script>
        // Set Global Chart.js Defaults
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';

        document.addEventListener('DOMContentLoaded', function() {
            const envCtx = document.getElementById('envChart').getContext('2d');
            const dustCtx = document.getElementById('dustChart').getContext('2d');

            const envChart = new Chart(envCtx, {
                type: 'line',
                data: { 
                    labels: [], 
                    datasets: [
                        { 
                            label: 'Temperature °C', 
                            data: [], 
                            borderColor: '#fb7185', 
                            backgroundColor: 'rgba(251, 113, 133, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        },
                        { 
                            label: 'Humidity %', 
                            data: [], 
                            borderColor: '#38bdf8', 
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            fill: true,
                            tension: 0.4, 
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'top', align: 'end' } },
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });

            const dustChart = new Chart(dustCtx, {
                type: 'line',
                data: { 
                    labels: [], 
                    datasets: [{ 
                        label: 'PM2.5 Concentration', 
                        data: [], 
                        borderColor: '#34d399', 
                        backgroundColor: 'rgba(52, 211, 153, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });

            async function updateData() {
                try {
                    const res = await fetch('/api/data');
                    const val = await res.json();

                    [envChart, dustChart].forEach(chart => {
                        chart.data.labels.push(val.time);
                        if(chart.data.labels.length > 20) chart.data.labels.shift();
                    });

                    envChart.data.datasets[0].data.push(val.temp);
                    envChart.data.datasets[1].data.push(val.humidity);
                    dustChart.data.datasets[0].data.push(val.dust);

                    [envChart, dustChart].forEach(chart => {
                        if(chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                        if(chart.data.datasets[1]) {
                             if(chart.data.datasets[1].data.length > 20) chart.data.datasets[1].data.shift();
                        }
                        chart.update('none');
                    });
                } catch (err) { console.error("Update failed", err); }
            }

            setInterval(updateData, 2000);
        });
    </script>
</body>
</html>
