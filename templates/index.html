<!DOCTYPE html>
<html>
<head>
    <title>Pi Live Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background:#f0f0f0; font-family:sans-serif;">
    <h1>Live Sensor Monitor</h1>
    <div style="width:800px; margin:auto; background:white; padding:20px; margin-bottom:20px;">
        <canvas id="envChart"></canvas>
    </div>
    <div style="width:800px; margin:auto; background:white; padding:20px;">
        <canvas id="dustChart"></canvas>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const envCtx = document.getElementById('envChart').getContext('2d');
        const dustCtx = document.getElementById('dustChart').getContext('2d');

        const envChart = new Chart(envCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp (C)', data: [], borderColor: 'red', tension: 0.3 },
                { label: 'Humidity (%)', data: [], borderColor: 'blue', tension: 0.3 }
            ]}
        });

        const dustChart = new Chart(dustCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Dust (PM2.5)', data: [], borderColor: 'green', backgroundColor: 'rgba(0,255,0,0.1)', fill: true }
            ]}
        });

        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const val = await res.json();

                // Add Time Label
                envChart.data.labels.push(val.time);
                dustChart.data.labels.push(val.time);

                // Add Values
                envChart.data.datasets[0].data.push(val.temp);
                envChart.data.datasets[1].data.push(val.humidity);
                dustChart.data.datasets[0].data.push(val.dust);

                // Keep only last 15 points
                if(envChart.data.labels.length > 15) {
                    envChart.data.labels.shift();
                    envChart.data.datasets[0].data.shift();
                    envChart.data.datasets[1].data.shift();
                    dustChart.data.labels.shift();
                    dustChart.data.datasets[0].data.shift();
                }

                envChart.update('none'); // 'none' for better performance
                dustChart.update('none');
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        setInterval(updateData, 2000);
    });
    </script>
</body>
</html>
