<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Station Pro | Biome Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-temp: #fb7185;
            --accent-hum: #38bdf8;
            --accent-dust: #34d399;
            --warning-gold: #fbbf24;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* PREDICTION SECTION (BIGGER) */
        .prediction-panel {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .prediction-panel.active {
            border-color: var(--warning-gold);
            background: linear-gradient(135deg, #451a03 0%, #78350f 100%);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .prediction-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 10px; }
        .prediction-text { font-size: 1.4rem; font-weight: 800; line-height: 1.2; }

        /* REGULAR STATS */
        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px 15px;
            border-radius: 12px;
            border-left: 4px solid var(--text-dim);
        }
        .stat-card.temp { border-left-color: var(--accent-temp); }
        .stat-card.hum { border-left-color: var(--accent-hum); }
        .stat-card.dust { border-left-color: var(--accent-dust); }
        .stat-card.alerts { border-left-color: var(--danger); }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 600; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
        }

        .warning-active { border-color: var(--danger); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="prediction-panel" id="prediction-panel">
            <div class="prediction-label">AI BIOME FORECAST</div>
            <div class="prediction-text" id="prediction-output">Monitoring Trends...</div>
        </div>

        <h2>24h History</h2>
        <div class="stat-card temp">
            <div class="stat-label">MAX TEMP</div>
            <div class="stat-value" id="max-temp">--°C</div>
        </div>
        <div class="stat-card hum">
            <div class="stat-label">MAX HUMIDITY</div>
            <div class="stat-value" id="max-hum">--%</div>
        </div>
        <div class="stat-card dust">
            <div class="stat-label">MAX DUST</div>
            <div class="stat-value" id="max-dust">-- µg</div>
        </div>
        <div class="stat-card alerts">
            <div class="stat-label">TOTAL ALERTS</div>
            <div class="stat-value" id="alert-count" style="color:var(--danger)">0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container" id="env-card">
            <canvas id="envChart" height="90"></canvas>
        </div>
        <div class="chart-container" id="dust-card">
            <canvas id="dustChart" height="90"></canvas>
        </div>
    </div>

    <script>
        Chart.defaults.color = '#94a3b8';
        document.addEventListener('DOMContentLoaded', function() {
            const envCtx = document.getElementById('envChart').getContext('2d');
            const dustCtx = document.getElementById('dustChart').getContext('2d');

            const envChart = new Chart(envCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Temp °C', data: [], borderColor: '#fb7185', tension: 0.4, fill: true, backgroundColor: 'rgba(251, 113, 133, 0.05)' },
                        { label: 'Humidity %', data: [], borderColor: '#38bdf8', tension: 0.4, fill: true, backgroundColor: 'rgba(56, 189, 248, 0.05)' }
                    ]
                },
                options: { responsive: true }
            });

            const dustChart = new Chart(dustCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{ label: 'PM2.5', data: [], borderColor: '#34d399', tension: 0.4, fill: true, backgroundColor: 'rgba(52, 211, 153, 0.1)' }]
                },
                options: { responsive: true }
            });

            async function update() {
                try {
                    const res = await fetch('/api/data');
                    const d = await res.json();

                    // Sidebar Stats
                    document.getElementById('max-temp').innerText = d.max_temp + '°C';
                    document.getElementById('max-hum').innerText = d.max_hum + '%';
                    document.getElementById('max-dust').innerText = d.max_dust + ' µg';
                    document.getElementById('alert-count').innerText = d.alerts;

                    // Prediction Logic
                    const predPanel = document.getElementById('prediction-panel');
                    const predText = document.getElementById('prediction-output');
                    
                    if (d.predict_mites) {
                        predPanel.classList.add('active');
                        predText.innerHTML = "⚠️ DUST MITES<br>PREDICTED SOON";
                        predText.style.color = "var(--warning-gold)";
                    } else {
                        predPanel.classList.remove('active');
                        predText.innerText = "ENVIRONMENT STABLE";
                        predText.style.color = "white";
                    }

                    // Warning Indicators
                    document.getElementById('env-card').className = (d.temp >= 20 && d.temp <= 28) || (d.humidity >= 75 && d.humidity <= 80) ? 'chart-container warning-active' : 'chart-container';
                    document.getElementById('dust-card').className = d.dust > 9 ? 'chart-container warning-active' : 'chart-container';

                    // Update Charts
                    [envChart, dustChart].forEach(c => {
                        c.data.labels.push(d.time);
                        if(c.data.labels.length > 20) c.data.labels.shift();
                    });
                    envChart.data.datasets[0].data.push(d.temp);
                    envChart.data.datasets[1].data.push(d.humidity);
                    dustChart.data.datasets[0].data.push(d.dust);
                    [envChart, dustChart].forEach(c => {
                        c.data.datasets.forEach(s => { if(s.data.length > 20) s.data.shift(); });
                        c.update('none');
                    });

                } catch (e) { console.error(e); }
            }
            setInterval(update, 2000);
        });
    </script>
</body>
</html>
